# Foundry config for running the Solidity tests with `forge test`.
# (Hardhat 3 also runs these via `npx hardhat test solidity`.)
[profile.default]
src = "contracts"
test = "test"
libs = ["node_modules", "lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["forge-std/=node_modules/forge-std/src/"]
